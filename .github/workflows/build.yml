name: Build MacroDeck EXE

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pyinstaller
          pip install pyserial psutil GPUtil keyboard mouse websockets
          pip install pywin32 comtypes pycaw WMI

      - name: Build EXE with PyInstaller
        run: |
          pyinstaller `
            --onefile `
            --noconsole `
            --name MacroDeck `
            --add-data "gui.html;." `
            --hidden-import win32gui `
            --hidden-import win32process `
            --hidden-import win32api `
            --hidden-import win32con `
            --hidden-import pycaw.pycaw `
            --hidden-import comtypes `
            --hidden-import wmi `
            --hidden-import GPUtil `
            --hidden-import serial `
            --hidden-import serial.tools.list_ports `
            --hidden-import websockets `
            --hidden-import keyboard `
            --hidden-import mouse `
            backend.py

      - name: Upload EXE as artifact
        uses: actions/upload-artifact@v4
        with:
          name: MacroDeck-EXE
          path: dist/MacroDeck.exe

      - name: Generate build tag
        id: tag
        shell: bash
        run: echo "name=build-${{ github.run_number }}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          files: dist/MacroDeck.exe
          name: MacroDeck build #${{ github.run_number }}
          body: |
            ## MacroDeck — build automatique #${{ github.run_number }}

            Compilé depuis le commit ${{ github.sha }}

            ### Installation
            1. Télécharge `MacroDeck.exe`
            2. Place-le dans un dossier dédié (le `gui.html` est intégré dans l'exe)
            3. Double-clique pour lancer le backend (aucune fenêtre ne s'ouvre)
            4. Ouvre manuellement `http://127.0.0.1:8766/gui.html` dans ton navigateur

            ### Dépendances externes (optionnel)
            - [OpenHardwareMonitor](https://openhardwaremonitor.org/) pour les températures CPU/GPU
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
